<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — OS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #111111;
      --surface: #1a1a1a;
      --border:  #2a2a2a;
      --text:    #e0e0e0;
      --muted:   #666666;
      --accent:  #4a9eff;
      --danger:  #ff4a4a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 40px 48px;
      text-align: center;
      width: 100%;
      max-width: 360px;
    }

    .brand {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 32px;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-google:hover { opacity: 0.85; }

    .error {
      margin-top: 16px;
      color: var(--danger);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">OS</div>
    <div class="subtitle">Personal Execution System</div>
    <a href="/auth/start" class="btn-google">Sign in with Google</a>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
  </div>
</body>
</html>
