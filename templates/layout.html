<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}OS{% endblock %}</title>
  {% block head %}{% endblock %}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #111111;
      --surface:  #1a1a1a;
      --border:   #2a2a2a;
      --text:     #e0e0e0;
      --muted:    #666666;
      --accent:   #4a9eff;
      --danger:   #ff4a4a;
      --success:  #4aff91;
      --warn:     #ffb84a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    nav .brand {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      letter-spacing: 0.05em;
    }

    nav a {
      color: var(--muted);
      font-size: 13px;
    }

    nav a:hover, nav a.active { color: var(--text); text-decoration: none; }

    /* sitewide fast-capture bar — present on every authenticated page */
    .capture-bar {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: 420px;
      margin-left: auto;
    }
    #capture-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 13px;
      padding: 6px 10px;
    }
    #capture-input:focus { border-color: var(--accent); }
    #capture-input::placeholder { color: var(--muted); }
    .capture-status {
      font-size: 11px;
      white-space: nowrap;
      min-width: 0;
    }
    .capture-status.ok  { color: var(--success); }
    .capture-status.err { color: var(--danger); }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; }
    h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 8px;
    }

    .card:hover { border-color: #3a3a3a; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 8px 12px; border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      background: var(--border);
      color: var(--muted);
    }

    .badge.inbox     { background: #1e2a3a; color: #4a9eff; }
    .badge.active    { background: #1a2e1a; color: var(--success); }
    .badge.blocked   { background: #2e1a1a; color: var(--danger); }
    .badge.done      { background: #1e1e1e; color: var(--muted); }
    .badge.critical  { background: #2e1a1a; color: var(--danger); }
    .badge.high      { background: #2e241a; color: var(--warn); }
    .badge.medium    { background: #1e2a3a; color: var(--accent); }
    .badge.low       { background: #1e1e1e; color: var(--muted); }

    form { display: flex; flex-direction: column; gap: 12px; }

    input, textarea, select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      padding: 8px 10px;
      width: 100%;
      outline: none;
    }

    input:focus, textarea:focus, select:focus { border-color: var(--accent); }

    label { font-size: 12px; color: var(--muted); margin-bottom: 4px; display: block; }

    .field { display: flex; flex-direction: column; }

    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }

    button, .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: inline-block;
    }

    button:hover, .btn:hover { opacity: 0.85; text-decoration: none; }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .actions { display: flex; gap: 8px; align-items: center; }

    .empty { color: var(--muted); font-size: 13px; padding: 24px 0; }

    .section { margin-bottom: 40px; }

    /* task controls bar */
    .ctrl-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .ctrl-bar .filters {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    select.filter-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
      padding: 5px 8px;
      border-radius: 4px;
      width: auto;
      cursor: pointer;
      outline: none;
    }
    select.filter-select:focus { border-color: var(--accent); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .sort-sep { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }

    /* hide advanced columns in simple view */
    table.simple .adv-col { display: none; }

    /* complete button column in task list */
    .complete-col { width: 28px; padding: 4px 4px 4px 8px; }
    .complete-col button {
      opacity: 0;
      transition: opacity 0.1s;
      background: transparent;
      border: 1px solid var(--success);
      color: var(--success);
      padding: 2px 6px;
      font-size: 11px;
      border-radius: 3px;
      cursor: pointer;
      white-space: nowrap;
    }
    tr:hover .complete-col button { opacity: 1; }
    /* revert state: warn color when hovering a done row */
    tr[data-status="done"] .complete-col button { border-color: var(--warn); color: var(--warn); }
    /* green tint on completed rows */
    tr[data-status="done"] td { background: rgba(74, 255, 145, 0.18); }

    /* delete button column in task list — same layout as complete-col, danger color */
    .delete-col { width: 28px; padding: 4px 8px 4px 4px; }
    .delete-col button {
      opacity: 0;
      transition: opacity 0.1s;
      background: transparent;
      border: 1px solid var(--danger, #e05252);
      color: var(--danger, #e05252);
      padding: 2px 6px;
      font-size: 11px;
      border-radius: 3px;
      cursor: pointer;
      white-space: nowrap;
    }
    tr:hover .delete-col button { opacity: 1; }

    /* subtask tree */
    .tree-row { padding: 8px 8px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .tree-row:last-child { border-bottom: none; }
    .tree-row.tree-current { background: rgba(74, 158, 255, 0.07); }
    .tree-connector { color: var(--muted); margin-right: 4px; }
    .btn-active { background: var(--accent); color: #fff; border: 1px solid var(--accent); }

    /* recurring tasks modal */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      width: 100%; max-width: 420px; max-height: 80vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
    }
    .modal-body { padding: 12px 16px; overflow-y: auto; }
    .recurring-item { margin-bottom: 8px; }
    .recurring-item:last-child { margin-bottom: 0; }
    .recurring-item input[type="checkbox"] { width: auto; accent-color: var(--accent); }
  </style>
</head>
<body>
  <nav>
    <span class="brand">OS</span>
    <a href="/dashboard">Dashboard</a>
    <a href="/tasks">Tasks</a>
    <a href="/projects">Projects</a>
    <a href="/calendar">Calendar</a>
    <a href="/chat">Chat</a>
    <a href="/vault">Vault</a>
    <div class="capture-bar">
      <input type="text" id="capture-input" placeholder="Quick capture — type a task, press Enter"
             autocomplete="off" aria-label="Quick capture — add a task">
      <span class="capture-status" id="capture-status" aria-live="polite"></span>
    </div>
  </nav>
  <div class="{% block container_class %}container{% endblock %}">
    {% block content %}{% endblock %}
  </div>
  <script>
    (function () {
      const input  = document.getElementById('capture-input');
      const status = document.getElementById('capture-status');
      if (!input) return;

      let statusTimer = null;
      function setStatus(text, cls) {
        clearTimeout(statusTimer);
        status.textContent = text;
        status.className = 'capture-status' + (cls ? ' ' + cls : '');
        statusTimer = setTimeout(() => { status.textContent = ''; status.className = 'capture-status'; }, 2500);
      }

      input.addEventListener('keydown', async (e) => {
        if (e.key !== 'Enter') return;
        e.preventDefault();
        const title = input.value.trim();
        if (!title) return;

        input.disabled = true;
        try {
          const res = await fetch('/capture', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title }),
          });
          const data = await res.json().catch(() => null);
          if (res.ok && data && data.ok) {
            input.value = '';
            setStatus('Added ✓', 'ok');
          } else {
            setStatus('Error: ' + (data && data.error ? data.error : res.status), 'err');
          }
        } catch (err) {
          setStatus('Network error', 'err');
        }
        input.disabled = false;
        input.focus();
      });
    })();
  </script>
  <script>
    // Stash the browser's IANA timezone in a cookie so server-side routes (recurring
    // task reset, etc.) can compute local day/week boundaries instead of assuming UTC.
    // Only rewritten when missing/stale to avoid a cookie write on every page load.
    // Not percent-encoded: real IANA zone names only ever use letters/digits/_/+/-//,
    // all valid cookie-value characters, and Flask/Werkzeug's cookie parser does not
    // percent-decode values on the way back out — encoding here without a matching
    // server-side decode would leave every zone containing "/" (i.e. almost all of
    // them) unmatched by db.py's validator and silently falling back to UTC.
    (function () {
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      const match = document.cookie.match(/(?:^|; )tz=([^;]*)/);
      const current = match ? match[1] : null;
      if (tz && tz !== current) {
        document.cookie = 'tz=' + tz + '; path=/; max-age=31536000; samesite=lax';
      }
    })();
  </script>
</body>
</html>
