<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}OS{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #111111;
      --surface:  #1a1a1a;
      --border:   #2a2a2a;
      --text:     #e0e0e0;
      --muted:    #666666;
      --accent:   #4a9eff;
      --danger:   #ff4a4a;
      --success:  #4aff91;
      --warn:     #ffb84a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    nav .brand {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      letter-spacing: 0.05em;
    }

    nav a {
      color: var(--muted);
      font-size: 13px;
    }

    nav a:hover, nav a.active { color: var(--text); text-decoration: none; }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; }
    h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 8px;
    }

    .card:hover { border-color: #3a3a3a; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 8px 12px; border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      background: var(--border);
      color: var(--muted);
    }

    .badge.inbox     { background: #1e2a3a; color: #4a9eff; }
    .badge.active    { background: #1a2e1a; color: var(--success); }
    .badge.blocked   { background: #2e1a1a; color: var(--danger); }
    .badge.done      { background: #1e1e1e; color: var(--muted); }
    .badge.critical  { background: #2e1a1a; color: var(--danger); }
    .badge.high      { background: #2e241a; color: var(--warn); }
    .badge.medium    { background: #1e2a3a; color: var(--accent); }
    .badge.low       { background: #1e1e1e; color: var(--muted); }

    form { display: flex; flex-direction: column; gap: 12px; }

    input, textarea, select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      padding: 8px 10px;
      width: 100%;
      outline: none;
    }

    input:focus, textarea:focus, select:focus { border-color: var(--accent); }

    label { font-size: 12px; color: var(--muted); margin-bottom: 4px; display: block; }

    .field { display: flex; flex-direction: column; }

    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }

    button, .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: inline-block;
    }

    button:hover, .btn:hover { opacity: 0.85; text-decoration: none; }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .actions { display: flex; gap: 8px; align-items: center; }

    .empty { color: var(--muted); font-size: 13px; padding: 24px 0; }

    .section { margin-bottom: 40px; }

    /* task controls bar */
    .ctrl-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .ctrl-bar .filters {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    select.filter-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
      padding: 5px 8px;
      border-radius: 4px;
      width: auto;
      cursor: pointer;
      outline: none;
    }
    select.filter-select:focus { border-color: var(--accent); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .sort-sep { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }

    /* hide advanced columns in simple view */
    table.simple .adv-col { display: none; }

    /* complete button column in task list */
    .complete-col { width: 28px; padding: 4px 4px 4px 8px; }
    .complete-col button {
      opacity: 0;
      transition: opacity 0.1s;
      background: transparent;
      border: 1px solid var(--success);
      color: var(--success);
      padding: 2px 6px;
      font-size: 11px;
      border-radius: 3px;
      cursor: pointer;
      white-space: nowrap;
    }
    tr:hover .complete-col button { opacity: 1; }
    /* revert state: warn color when hovering a done row */
    tr[data-status="done"] .complete-col button { border-color: var(--warn); color: var(--warn); }
    /* green tint on completed rows */
    tr[data-status="done"] td { background: rgba(74, 255, 145, 0.18); }

    /* subtask tree */
    .tree-row { padding: 8px 8px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .tree-row:last-child { border-bottom: none; }
    .tree-row.tree-current { background: rgba(74, 158, 255, 0.07); }
    .tree-connector { color: var(--muted); margin-right: 4px; }
    .btn-active { background: var(--accent); color: #fff; border: 1px solid var(--accent); }
  </style>
</head>
<body>
  <nav>
    <span class="brand">OS</span>
    <a href="/dashboard">Dashboard</a>
    <a href="/tasks">Tasks</a>
    <a href="/projects">Projects</a>
    <a href="/chat">Chat</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
