{% extends "layout.html" %}
{% block title %}{{ chat.title }}{% endblock %}
{% block content %}

<style>
  .chat-wrap {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 120px);
    max-width: 720px;
    margin: 0 auto;
  }

  .chat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    flex-shrink: 0;
  }

  .chat-header-title {
    flex: 1;
    min-width: 0;
  }

  .chat-header-title h1 {
    margin-bottom: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 18px;
  }

  .chat-header-title .sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .chat-header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  #save-btn {
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: color 0.15s, border-color 0.15s;
  }

  #save-btn.saved {
    border-color: var(--success);
    color: var(--success);
  }

  #save-btn:hover { border-color: var(--accent); color: var(--accent); }
  #save-btn.saved:hover { border-color: var(--danger); color: var(--danger); }

  .chat-history {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 4px 0 16px;
  }

  .msg {
    max-width: 84%;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user {
    align-self: flex-end;
    background: #1e2e45;
    border: 1px solid #2a4060;
    color: var(--text);
  }

  .msg.assistant {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .msg.thinking {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-style: italic;
  }

  .chat-input-row {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    align-items: flex-end;
  }

  #chat-input {
    flex: 1;
    resize: none;
    height: 44px;
    line-height: 1.5;
    padding: 10px 12px;
    font-size: 14px;
    border-radius: 6px;
  }

  #send-btn {
    height: 44px;
    padding: 0 20px;
    border-radius: 6px;
    font-size: 13px;
  }

  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #attach-btn {
    height: 44px;
    width: 44px;
    padding: 0;
    border-radius: 6px;
    font-size: 18px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #attach-btn:hover { border-color: var(--accent); color: var(--accent); }
  #attach-file { display: none; }

  .sys-msg {
    align-self: center;
    font-size: 11px;
    color: var(--muted);
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
  }
</style>

<div class="chat-wrap">
  <div class="chat-header">
    <div class="chat-header-title">
      <h1 id="chat-title">{{ chat.title }}</h1>
      <div class="sub"><a href="/chat" style="color:var(--muted);">← All chats</a></div>
    </div>
    <div class="chat-header-actions">
      <button id="save-btn" class="{{ 'saved' if chat.indexed else '' }}"
              title="{{ 'Remove from vault' if chat.indexed else 'Save to vault for RAG' }}">
        {{ 'Saved to vault' if chat.indexed else 'Save to vault' }}
      </button>
      <form method="POST" action="/chat/new" style="margin:0;">
        <button type="submit" class="btn btn-ghost btn-sm">+ New</button>
      </form>
    </div>
  </div>

  <div class="chat-history" id="history">
    {% for m in messages %}
    <div class="msg {{ m.role }}">{{ m.content }}</div>
    {% endfor %}
    {% if not messages %}
    <div class="sys-msg">New chat — ask about your tasks, notes, or anything on your mind.</div>
    {% endif %}
  </div>

  <div class="chat-input-row">
    <button id="attach-btn" title="Upload file to vault inbox" onclick="document.getElementById('attach-file').click()">📎</button>
    <input type="file" id="attach-file" multiple accept=".md,.txt,.pdf,.html,.htm,.csv,.docx"
           onchange="uploadFiles(this.files)">
    <textarea id="chat-input" placeholder="What should I work on right now?"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const CHAT_ID   = {{ chat.id | tojson }};
  const historyEl = document.getElementById('history');
  const inputEl   = document.getElementById('chat-input');
  const sendBtn   = document.getElementById('send-btn');
  const saveBtn   = document.getElementById('save-btn');

  let isSaved = {{ 'true' if chat.indexed else 'false' }};

  function appendMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    historyEl.appendChild(div);
    historyEl.scrollTop = historyEl.scrollHeight;
    return div;
  }

  function appendSys(text) {
    const div = document.createElement('div');
    div.className = 'sys-msg';
    div.textContent = text;
    historyEl.appendChild(div);
    historyEl.scrollTop = historyEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    sendBtn.disabled = true;

    // Remove the "new chat" placeholder if present
    const placeholder = historyEl.querySelector('.sys-msg');
    if (placeholder) placeholder.remove();

    appendMsg('user', text);
    const thinking = appendMsg('thinking', 'Thinking…');

    try {
      const res = await fetch(`/chat/${CHAT_ID}/message`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: text }),
      });

      thinking.remove();
      const data = await res.json().catch(() => null);

      if (!res.ok || !data || data.error) {
        appendMsg('assistant', 'Error: ' + (data?.error || `Server error (${res.status})`));
      } else {
        appendMsg('assistant', data.reply);
        // Update page title to reflect auto-title on first message
        if (document.getElementById('chat-title').textContent === 'New Chat') {
          const titleRes = await fetch(`/chat/${CHAT_ID}`);
          // Can't easily extract the title from HTML; rely on server-set h1 on next load.
          // Just trim the input as a local approximation.
          const approx = text.slice(0, 60) + (text.length > 60 ? '...' : '');
          document.getElementById('chat-title').textContent = approx;
          document.title = approx;
        }
      }
    } catch (err) {
      thinking.remove();
      appendMsg('assistant', 'Network error: ' + err.message);
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  saveBtn.addEventListener('click', async () => {
    saveBtn.disabled = true;
    try {
      const res = await fetch(`/chat/${CHAT_ID}/save`, { method: 'POST' });
      const data = await res.json().catch(() => null);
      if (!res.ok || !data) { saveBtn.disabled = false; return; }
      isSaved = data.indexed;
      saveBtn.textContent = isSaved ? 'Saved to vault' : 'Save to vault';
      saveBtn.title = isSaved ? 'Remove from vault' : 'Save to vault for RAG';
      saveBtn.className = isSaved ? 'saved' : '';
    } catch (err) {
      appendSys('Save failed: ' + err.message);
    }
    saveBtn.disabled = false;
  });

  async function uploadFiles(files) {
    if (!files.length) return;
    appendSys(`Uploading ${files.length === 1 ? files[0].name : files.length + ' files'} → vault/inbox…`);

    const fd = new FormData();
    fd.append('folder', 'inbox');
    for (const f of files) fd.append('file', f);

    try {
      const res = await fetch('/vault/upload', {
        method: 'POST',
        headers: { 'X-Requested-With': 'XMLHttpRequest' },
        body: fd,
      });
      const data = await res.json().catch(() => null);
      if (!res.ok || data?.error) {
        appendSys('Upload failed: ' + (data?.error || res.status));
      } else {
        const n = data.saved.length;
        appendSys(`✓ ${n} file${n !== 1 ? 's' : ''} saved to vault/inbox — ask me about ${n === 1 ? 'it' : 'them'} anytime.`);
        if (data.errors?.length) appendSys('Skipped: ' + data.errors.join('; '));
      }
    } catch (err) {
      appendSys('Upload error: ' + err.message);
    }

    document.getElementById('attach-file').value = '';
  }

  // Scroll to bottom on load
  historyEl.scrollTop = historyEl.scrollHeight;
  inputEl.focus();
</script>

{% endblock %}
